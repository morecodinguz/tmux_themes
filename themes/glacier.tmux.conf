# GLACIER — cool cascading powerline (redesigned tmux2k)
# bg #11111b, lavender → sapphire → green cascade, lavender time pill
source-file ~/tmux_themes/themes/_common.tmux

# Pane bg and borders
set -g window-style 'bg=#11111b'
set -g window-active-style 'bg=#11111b'
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#b4befe'
set -g message-style 'bg=#b4befe,fg=#11111b'

# Status base
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-left-length 200
set -g status-right-length 200
set -g status-style "bg=#11111b,fg=#cdd6f4"

# tmux2k plugin — Glacier (cool cascade) palette
set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-black "#11111b"
set -g @tmux2k-icons-only false
set -g @tmux2k-show-powerline true
set -g @tmux2k-left-plugins "session git"
set -g @tmux2k-right-plugins "cpu ram battery time"
set -g @tmux2k-refresh-rate 5
set -g @tmux2k-military-time true
set -g @tmux2k-time-format "%H:%M"
set -g @tmux2k-shell /opt/homebrew/bin/bash

# Cool cascade segment colors
set -g @tmux2k-session-colors "lavender black"
set -g @tmux2k-git-colors "sapphire black"
set -g @tmux2k-cpu-colors "crust sapphire"
set -g @tmux2k-ram-colors "crust teal"
set -g @tmux2k-battery-colors "green black"
set -g @tmux2k-time-colors "lavender black"

# Window list — active lavender, inactive surface2
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#585b70,bg=#11111b] ○ #I #W "
setw -g window-status-current-format "#[fg=#b4befe,bg=#11111b,bold] ● #I #W "

# Prefix indicator on status-left (replaces tmux2k's default L-most segment behaviour)
# tmux2k generates status-left after run; we prepend via status-left-style not viable.
# Instead we let tmux2k own the bar entirely and the prefix indicator lives in window-status.
# (Tradeoff: less visual hint while prefix held; restored via message-style on commands.)

run ~/.tmux/plugins/tmux2k/2k.tmux
