# CATPPUCCIN-MOCHA — official catppuccin/tmux plugin (mocha flavor)
source-file ~/tmux_themes/themes/_common.tmux

set -g window-style 'bg=#1e1e2e'
set -g window-active-style 'bg=#1e1e2e'
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'
set -g message-style 'bg=#cba6f7,fg=#1e1e2e'

# Catppuccin plugin — load mocha flavor with built-in modules
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_status 'icon'
set -g @catppuccin_window_current_text_color "#{E:@thm_lavender}"

# tmux-battery scans the options listed in @plugin_interpolated_options for
# #{battery_icon}/#{battery_percentage} and rewrites them into shell-call form.
# catppuccin stores the battery placeholders inside @catppuccin_status_battery
# (with #{l:#{battery_icon}} wrappers), so we explicitly tell tmux-battery to
# scan that option in addition to status-right/-left.
#
# (We drop the CPU module from the status template because tmux-cpu does NOT
# honor @plugin_interpolated_options — it only scans status-right/-left, so
# its substitution can't reach inside catppuccin's @catppuccin_status_cpu.
# Re-add later via direct shell-call helpers if you want CPU on this theme.)
set -g @plugin_interpolated_options "status-right status-left @catppuccin_status_battery @catppuccin_battery_icon @catppuccin_battery_text"

# 1. Initialize catppuccin — populates @catppuccin_status_* options
run ~/.tmux/plugins/catppuccin/catppuccin.tmux

# 2. Status modules: directory · application · battery · date/time
set -g status-left-length 100
set -g status-right-length 200
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_application}#{E:@catppuccin_status_battery}#{E:@catppuccin_status_date_time}"

# 3. Run tmux-battery — scans the options, rewrites placeholders to shell calls
run ~/.tmux/plugins/tmux-battery/battery.tmux

# Prefix indicator (prepend to status-left)
set -ga status-left "#{?client_prefix,#[fg=#f38ba8]●,#[fg=#585b70]●} "
