# CATPPUCCIN-MOCHA — official catppuccin/tmux plugin (mocha flavor)
source-file ~/tmux_themes/themes/_common.tmux

set -g window-style 'bg=#1e1e2e'
set -g window-active-style 'bg=#1e1e2e'
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'
set -g message-style 'bg=#cba6f7,fg=#1e1e2e'

# Catppuccin plugin — load mocha flavor with built-in modules
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_status 'icon'
set -g @catppuccin_window_current_text_color "#{E:@thm_lavender}"

# 1. Initialize catppuccin — populates @catppuccin_status_* options
run ~/.tmux/plugins/catppuccin/catppuccin.tmux

# 2. Build status-left/-right with `set -aF` so each @catppuccin_status_* value
#    is EVALUATED at set-time (the -F flag) and INLINED into the option. Without
#    -F, status-right would just store a reference like "#{E:@catppuccin_status_battery}"
#    and tmux-battery's later scan would never see the #{battery_icon} placeholder
#    that lives inside that option's value. With -F, the placeholder text ends up
#    directly in status-right, where tmux-battery's scan can rewrite it.
set -g status-left-length 100
set -g status-right-length 200
set -g status-left ""
set -agF status-left "#{E:@catppuccin_status_session}"

set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# 3. Run tmux-battery LAST — its scan now sees #{battery_icon} / #{battery_percentage}
#    inlined in status-right and rewrites them to #(scripts/battery_*.sh) shell calls.
run ~/.tmux/plugins/tmux-battery/battery.tmux

# Prefix indicator (prepend to status-left)
set -ga status-left "#{?client_prefix,#[fg=#f38ba8]●,#[fg=#585b70]●} "
