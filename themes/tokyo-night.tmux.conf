# TOKYO-NIGHT — janoamaral/tokyo-night-tmux
source-file ~/tmux_themes/themes/_common.tmux

set -g window-style 'bg=#1a1b26'
set -g window-active-style 'bg=#1a1b26'
set -g pane-border-style 'fg=#414868'
set -g pane-active-border-style 'fg=#7aa2f7'
set -g message-style 'bg=#7aa2f7,fg=#1a1b26'

# Tokyo Night plugin config
set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format MYD
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name "Battery"
set -g @tokyo-night-tmux_show_git 1
set -g @tokyo-night-tmux_show_hostname 0

# Initialize plugin
run ~/.tmux/plugins/tokyo-night/tokyo-night.tmux

# Prefix indicator
set -ga status-left "#{?client_prefix,#[fg=#f7768e]●,#[fg=#414868]●} "
