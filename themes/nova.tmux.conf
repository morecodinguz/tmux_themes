# NOVA — o0th/tmux-nova (clean rectangular blocks, nord-style default)
source-file ~/tmux_themes/themes/_common.tmux

set -g window-style 'bg=#2e3440'
set -g window-active-style 'bg=#2e3440'
set -g pane-border-style 'fg=#3b4252'
set -g pane-active-border-style 'fg=#88c0d0'
set -g message-style 'bg=#88c0d0,fg=#2e3440'

# Nova plugin — segments framework
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left ""
set -g @nova-nerdfonts-right ""

# Status segments
set -g @nova-segment-mode "#{?client_prefix,Ω,ω}"
set -g @nova-segment-mode-colors "#78a2c1 #2e3440"
set -g @nova-segment-whoami "#(whoami)@#h"
set -g @nova-segment-whoami-colors "#78a2c1 #2e3440"

set -g @nova-pane "#I#{?pane_in_mode, #{pane_mode},} #W"
set -g @nova-rows 0
set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "whoami"

# Initialize plugin
run ~/.tmux/plugins/tmux-nova/nova.tmux

# Prefix indicator
set -ga status-left "#{?client_prefix,#[fg=#bf616a]●,#[fg=#3b4252]●} "
