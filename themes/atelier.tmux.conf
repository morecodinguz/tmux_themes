# ATELIER — pastel floating pills (redesigned catppuccin)
# bg #1e1e2e. Each segment is a self-contained rounded pill.
# Solid: mauve session, lavender path, peach branch, pink time
# Subtle: surface0 window pills
# Outlined: lavender CPU, teal RAM, yellow battery
source-file ~/tmux_themes/themes/_common.tmux

# Pane bg + borders
set -g window-style 'bg=#1e1e2e'
set -g window-active-style 'bg=#1e1e2e'
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'
set -g message-style 'bg=#cba6f7,fg=#1e1e2e'

# Status base
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 15
set -g status-left-length 250
set -g status-right-length 250
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Rounded pill end caps (Nerd Font Powerline-Extra)
#   = U+E0B6 (left rounded), e0b4 = U+E0B4 (right rounded)
# Prefix indicator: dim ● when idle, bright mauve ● glow when prefix held
set -g status-left "#{?client_prefix,#[fg=#cba6f7]●,#[fg=#585b70]●} #[fg=#cba6f7,bg=#1e1e2e]#[fg=#1e1e2e,bg=#cba6f7,bold] ⌂ #S #[fg=#cba6f7,bg=#1e1e2e] #[fg=#b4befe,bg=#1e1e2e]#[fg=#1e1e2e,bg=#b4befe] ▸ #(~/tmux_themes/helpers/path-short.sh) #[fg=#b4befe,bg=#1e1e2e] #[fg=#fab387,bg=#1e1e2e]#[fg=#1e1e2e,bg=#fab387] ⎇ #(~/tmux_themes/helpers/git-branch.sh) #[fg=#fab387,bg=#1e1e2e] "

# Window list — subtle surface0 pills with markers
setw -g window-status-separator " "
setw -g window-status-format "#[fg=#313244,bg=#1e1e2e]#[fg=#6c7086,bg=#313244] ○ #I #W #[fg=#313244,bg=#1e1e2e]"
setw -g window-status-current-format "#[fg=#313244,bg=#1e1e2e]#[fg=#cba6f7,bg=#313244,bold] ● #I #W #[fg=#313244,bg=#1e1e2e]"

# Right side — outlined CPU/MEM/BAT pills + solid pink time pill
set -g status-right "#[fg=#b4befe,bg=#1e1e2e]⦗ ⌬ #(~/tmux_themes/helpers/cpu.sh) ⦘#[fg=#1e1e2e]  #[fg=#94e2d5,bg=#1e1e2e]⦗ ▤ #(~/tmux_themes/helpers/mem.sh) ⦘  #[fg=#f9e2af,bg=#1e1e2e]⦗ ▮ #(~/tmux_themes/helpers/battery.sh) ⦘  #[fg=#f5c2e7,bg=#1e1e2e]#[fg=#1e1e2e,bg=#f5c2e7,bold] ⌚ %H:%M #[fg=#f5c2e7,bg=#1e1e2e] "
