# POWERLINE-CLASSIC — original heavy powerline aesthetic, narrow-friendly
#
# The erikw/tmux-powerline plugin's defaults dump ~9 segments (hostname / IP /
# wifi / weather / day / date / battery / branch / session) which overflow on
# half-width panes. We keep the classic blue/green/yellow powerline LOOK but
# hand-craft the segment list down to the essentials so the bar stays clean
# at any width.
source-file ~/tmux_themes/themes/_common.tmux

# Pane bg / borders
set -g window-style 'bg=#000000'
set -g window-active-style 'bg=#000000'
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#5fafff'
set -g message-style 'bg=#5fafff,fg=#000000'

# Status base
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#000000,fg=#e4e4e4"

# Powerline colors (xterm-style classic)
#   blue    #5fafff   ← session
#   green   #87ff87   ← branch
#   yellow  #ffaf00   ← battery
#   pink    #ff87d7   ← time
#   black   #000000   ← bar bg

# Status-left: prefix indicator + blue session pill, with powerline notch
set -g status-left "#{?client_prefix,#[fg=#ff5f00]●,#[fg=#444444]●} #[fg=#000000,bg=#5fafff,bold] #S #[fg=#5fafff,bg=#000000] "

# Window list — current = bright blue, inactive = dim
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#7f7f7f,bg=#000000] #I #W "
setw -g window-status-current-format "#[fg=#5fafff,bg=#000000,bold] #I #W "

# Status-right: branch (auto-truncated to 24 chars) · battery · time
# tmux's #{=24:...} format trims long values gracefully so they never bleed
# into the next segment.
set -g status-right "#[fg=#87ff87,bg=#000000]  #{=24:#(~/tmux_themes/helpers/git-branch.sh)} #[fg=#444444]│ #[fg=#ffaf00]▮ #(~/tmux_themes/helpers/battery.sh) #[fg=#444444]│ #[fg=#ff87d7,bold]  %H:%M #[default]"
