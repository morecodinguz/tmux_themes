# POWERLINE-CLASSIC — heavy powerline aesthetic, narrow-friendly
#
# Hand-crafted (not via the erikw plugin) so we control segment list and
# truncation. Restores the rich set: hostname · private IP · public IP ·
# branch · battery · weather · time · date — but with auto-truncation on
# branch and proper separators so adjacent segments never jam together.
source-file ~/tmux_themes/themes/_common.tmux

# Pane bg / borders
set -g window-style 'bg=#000000'
set -g window-active-style 'bg=#000000'
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#5fafff'
set -g message-style 'bg=#5fafff,fg=#000000'

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#000000,fg=#e4e4e4"

# Powerline color identity:
#   blue   #5fafff   ← session, time
#   green  #87ff87   ← private IP
#   cyan   #5fdfff   ← public IP
#   yellow #ffaf00   ← branch
#   pink   #ff87d7   ← battery
#   peach  #ffaf87   ← weather
#   gray   #7f7f7f   ← date / dim
#   dim    #444444   ← thin │ separators

# Status-left: prefix dot + blue session pill
set -g status-left "#{?client_prefix,#[fg=#ff5f00]●,#[fg=#444444]●} #[fg=#000000,bg=#5fafff,bold] #S #[fg=#5fafff,bg=#000000] "

# Window list — current = blue, inactive = dim
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#7f7f7f,bg=#000000] #I #W "
setw -g window-status-current-format "#[fg=#5fafff,bg=#000000,bold] #I #W "

# Status-right: 8 segments, thin │ separators between them.
# - #h            hostname (built-in tmux)
# - #(...)        custom helper output
# - #{=20:...}    truncate inner expansion to 20 chars (auto-clip long branches)
# - %H:%M, %a %d %b   tmux strftime formats
set -g status-right "\
#[fg=#5fafff] #h \
#[fg=#444444]│ \
#[fg=#87ff87] #(~/tmux_themes/helpers/ip-private.sh) \
#[fg=#444444]│ \
#[fg=#5fdfff] #(~/tmux_themes/helpers/ip-public.sh) \
#[fg=#444444]│ \
#[fg=#ffaf00] #{=20:#(~/tmux_themes/helpers/git-branch.sh)} \
#[fg=#444444]│ \
#[fg=#ff87d7]▮ #(~/tmux_themes/helpers/battery.sh) \
#[fg=#444444]│ \
#[fg=#ffaf87]☀ #(~/tmux_themes/helpers/weather.sh) \
#[fg=#444444]│ \
#[fg=#5fafff,bold] %H:%M \
#[fg=#444444]│ \
#[fg=#7f7f7f]%a %d %b"
