# POWERLINE-CLASSIC — erikw/tmux-powerline (the original)
source-file ~/tmux_themes/themes/_common.tmux

set -g window-style 'bg=#000000'
set -g window-active-style 'bg=#000000'
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#5fafff'
set -g message-style 'bg=#5fafff,fg=#000000'

set -g status on
set -g status-interval 5
set -g status-justify centre

# tmux-powerline initializes via main.tmux
run ~/.tmux/plugins/tmux-powerline/main.tmux

# tmux-powerline expects status-left/right to be set externally
set-option -g status-left-length 90
set-option -g status-right-length 90
set-option -g status-left "#(~/.tmux/plugins/tmux-powerline/powerline.sh left)"
set-option -g status-right "#(~/.tmux/plugins/tmux-powerline/powerline.sh right)"

# Prefix indicator
set -ga status-left "#{?client_prefix,#[fg=#ff5f00]●,#[fg=#444444]●} "
