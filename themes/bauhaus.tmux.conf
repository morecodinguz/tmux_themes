# BAUHAUS — warm brutalist plates (redesigned ohmytmux)
# bg #000000. Triple-block heavy session frame + outlined rosewater data plates.
source-file ~/tmux_themes/themes/_common.tmux

# Pane bg + borders
set -g window-style 'bg=#000000'
set -g window-active-style 'bg=#000000'
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#f5e0dc'
set -g message-style 'bg=#f5e0dc,fg=#000000'

# Status base
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 15
set -g status-left-length 250
set -g status-right-length 250
set -g status-style "bg=#000000,fg=#cdd6f4"

# Prefix indicator + triple-block heavy session frame
set -g status-left "#{?client_prefix,#[fg=#f38ba8]●,#[fg=#585b70]●} #[fg=#f5e0dc,bg=#000000]▌▌▌#[fg=#000000,bg=#f5e0dc,bold] ⌂ #S #[fg=#f5e0dc,bg=#000000]▐▐▐ "

# Window list — ▶ marker + caps + ▎ separator
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#6c7086,bg=#000000] ○ #I▎#W #[fg=#585b70]"
setw -g window-status-current-format "#[fg=#fab387,bg=#000000,bold] ▶ #I▎#W #[fg=#585b70]"

# Right side — outlined data plates (rosewater border, no fill)
# Plate format: each item bracketed by thin frames built with #[reverse,fg=...]
# Using square brackets in rosewater for the plate look
set -g status-right "#[fg=#f5e0dc,bg=#000000]▕ #[fg=#f38ba8]⎇#[fg=#f5e0dc,bold] #(~/tmux_themes/helpers/git-branch.sh) #[fg=#f5e0dc,nobold]▏  ▕ #[fg=#fab387]▮#[fg=#f5e0dc,bold] #(~/tmux_themes/helpers/battery.sh) #[fg=#f5e0dc,nobold]▏  ▕ #[fg=#cdd6f4]⌚#[fg=#f5e0dc,bold] %H:%M #[fg=#f5e0dc,nobold]▏  ▕#[bold] %a %d %b #[nobold]▏ "
