# DRACULA — official dracula/tmux plugin
source-file ~/tmux_themes/themes/_common.tmux

set -g window-style 'bg=#282a36'
set -g window-active-style 'bg=#282a36'
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9'
set -g message-style 'bg=#bd93f9,fg=#282a36'

# Dracula plugin config
set -g @dracula-show-powerline true
set -g @dracula-show-flags false
set -g @dracula-show-left-icon session
set -g @dracula-plugins "git battery cpu-usage ram-usage time"
set -g @dracula-cpu-usage-label "CPU"
set -g @dracula-ram-usage-label "MEM"
set -g @dracula-day-month true
set -g @dracula-military-time true
set -g @dracula-show-timezone false
set -g @dracula-refresh-rate 5

# Initialize plugin
run ~/.tmux/plugins/dracula/dracula.tmux

# Prefix indicator (prepend to status-left)
set -ga status-left "#{?client_prefix,#[fg=#ff5555]●,#[fg=#44475a]●} "
