# TMUX-POWER — wfxr/tmux-power (gold variant)
source-file ~/tmux_themes/themes/_common.tmux

set -g window-style 'bg=#1c1c1c'
set -g window-active-style 'bg=#1c1c1c'
set -g pane-border-style 'fg=#3a3a3a'
set -g pane-active-border-style 'fg=#ffd700'
set -g message-style 'bg=#ffd700,fg=#1c1c1c'

# tmux-power plugin config
set -g @tmux_power_theme 'gold'
set -g @tmux_power_show_upload_speed false
set -g @tmux_power_show_download_speed false
set -g @tmux_power_show_web_reachable false
set -g @tmux_power_show_database_status false
set -g @tmux_power_date_icon ' '
set -g @tmux_power_time_icon ' '
set -g @tmux_power_user_icon ' '
set -g @tmux_power_session_icon ' '
set -g @tmux_power_time_format '%H:%M'
set -g @tmux_power_date_format '%a %d %b'

# Initialize plugin
run ~/.tmux/plugins/tmux-power/tmux-power.tmux

# Prefix indicator
set -ga status-left "#{?client_prefix,#[fg=#ff5f00]●,#[fg=#3a3a3a]●} "
